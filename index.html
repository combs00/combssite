<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMBS</title>
  <meta name="description" content="COMBS — coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050508;
      color: #f5f5f8;
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      font-weight: 800;
    }

    .splash {
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .splash h1 {
      font-size: clamp(3rem, 14vw, 8rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      font-weight: 800;
    }

    .splash p {
      margin-top: 1.25rem;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(245, 245, 248, 0.55);
    }

    .splash-social {
      margin-top: 2.25rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .splash-social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.65rem 1.1rem;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: none;
      color: rgba(245, 245, 248, 0.88);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .splash-social a:hover {
      border-color: rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .splash-social a:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.5);
      outline-offset: 3px;
    }

    .splash-social svg {
      width: 1.125rem;
      height: 1.125rem;
      flex-shrink: 0;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="splash">
    <h1>COMBS</h1>
    <p>Coming soon</p>
    <nav class="splash-social" aria-label="Social links">
      <a
        href="https://www.instagram.com/combs_vj/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="@combs_vj on Instagram"

        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

      </a>
      <a

        target="_blank"
        rel="noopener noreferrer"
        aria-label="RaveLoops at raveloops.club"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          <polyline points="15 3 21 3 21 9" />
          <line x1="10" y1="14" x2="21" y2="3" />
        </svg>
        RaveLoops
      </a>
    </nav>
  </div>
</body>
</html>
